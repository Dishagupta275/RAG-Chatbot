<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c6af7;
      --accent2: #f7c46a;
      --text: #e8e8f0;
      --text-muted: #7a7a8a;
      --success: #4ade80;
      --danger: #f87171;
      --radius: 12px;
      --font-mono: 'Space Mono', monospace;
      --font-sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      gap: 24px;
    }

    .logo {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo span { color: var(--accent); }

    .upload-area {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--surface2);
    }
    .upload-area:hover { border-color: var(--accent); background: #1e1e2e; }
    .upload-area.dragover { border-color: var(--accent); background: #1e1e2e; }

    .upload-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .upload-label {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .upload-label strong { color: var(--accent); }

    #fileInput { display: none; }

    .upload-btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 12px;
    }
    .upload-btn:hover { opacity: 0.85; }
    .upload-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .upload-status {
      font-size: 12px;
      font-family: var(--font-mono);
      padding: 8px 12px;
      border-radius: 8px;
      display: none;
    }
    .upload-status.success { background: #0d2a1a; color: var(--success); display: block; }
    .upload-status.error { background: #2a0d0d; color: var(--danger); display: block; }
    .upload-status.loading { background: var(--surface2); color: var(--accent); display: block; }

    .docs-section { flex: 1; overflow-y: auto; }
    .docs-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .doc-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
    }
    .doc-item:hover { background: var(--surface2); }
    .doc-item.active { background: #1e1a3a; border-color: var(--accent); }
    .doc-icon { font-size: 16px; }
    .doc-name {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .no-docs {
      font-size: 13px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      padding: 8px 0;
    }

    /* ── MAIN CHAT ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .active-doc-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .active-doc-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
    }
    .active-doc-badge .dot.inactive { background: var(--border); }
    .active-doc-name { color: var(--text); font-weight: 600; }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
    }
    .empty-state .big-icon { font-size: 48px; opacity: 0.4; }
    .empty-state h2 { font-size: 20px; color: var(--text); font-weight: 600; }
    .empty-state p { font-size: 14px; max-width: 320px; line-height: 1.6; }

    .message {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 780px;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 14px 18px;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.65;
    }
    .message.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.bot .bubble {
      background: var(--surface2);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    .sources {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
    }
    .sources-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .source-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent2);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      line-height: 1.5;
    }

    .thinking {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 14px 18px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .thinking span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── INPUT BAR ── */
    .input-bar {
      padding: 20px 28px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .input-wrap {
      flex: 1;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      padding: 4px 4px 4px 16px;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }

    #questionInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 15px;
      padding: 10px 0;
      resize: none;
      min-height: 44px;
      max-height: 120px;
    }
    #questionInput::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 40px; height: 40px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">RAG<span>.</span>chat</div>

  <div>
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📄</div>
      <div class="upload-label">
        <strong>Click to upload</strong> or drag & drop<br/>PDF files only
      </div>
    </div>
    <input type="file" id="fileInput" accept=".pdf" />
    <button class="upload-btn" id="uploadBtn" disabled>Upload & Index</button>
    <div class="upload-status" id="uploadStatus"></div>
  </div>

  <div class="docs-section">
    <div class="docs-title">Indexed Documents</div>
    <div id="docsList"><div class="no-docs">No documents yet</div></div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="active-doc-badge">
      <div class="dot inactive" id="statusDot"></div>
      <span id="activeDocLabel">No document selected</span>
    </div>
  </div>

  <div class="chat-window" id="chatWindow">
    <div class="empty-state" id="emptyState">
      <div class="big-icon">🤖</div>
      <h2>Ask your documents anything</h2>
      <p>Upload a PDF on the left, select it, then ask questions in natural language.</p>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="questionInput" placeholder="Ask a question about your document..." rows="1"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" disabled>➤</button>
  </div>
</main>

<script>
  const API = 'http://127.0.0.1:8000';
  let activeDoc = null;
  let selectedFile = null;

  // ── FILE SELECTION ──
  const fileInput = document.getElementById('fileInput');
  const uploadBtn = document.getElementById('uploadBtn');
  const uploadArea = document.getElementById('uploadArea');
  const uploadStatus = document.getElementById('uploadStatus');

  fileInput.addEventListener('change', () => {
    selectedFile = fileInput.files[0];
    if (selectedFile) {
      uploadBtn.disabled = false;
      uploadArea.querySelector('.upload-label').innerHTML =
        `<strong>${selectedFile.name}</strong><br/>${(selectedFile.size/1024).toFixed(1)} KB`;
    }
  });

  // drag & drop
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') {
      selectedFile = file;
      uploadBtn.disabled = false;
      uploadArea.querySelector('.upload-label').innerHTML =
        `<strong>${file.name}</strong><br/>${(file.size/1024).toFixed(1)} KB`;
    }
  });

  // ── UPLOAD ──
  uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    uploadBtn.disabled = true;
    showStatus('loading', '⏳ Uploading and indexing...');

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const res = await fetch(`${API}/upload`, { method: 'POST', body: formData });
      const data = await res.json();
      if (res.ok) {
        showStatus('success', `✅ Indexed ${data.chunks} chunks`);
        loadDocuments();
      } else {
        showStatus('error', `❌ ${data.detail || 'Upload failed'}`);
      }
    } catch (e) {
      showStatus('error', '❌ Cannot reach server');
    }
    uploadBtn.disabled = false;
  });

  function showStatus(type, msg) {
    uploadStatus.className = `upload-status ${type}`;
    uploadStatus.textContent = msg;
  }

  // ── LOAD DOCUMENTS ──
  async function loadDocuments() {
    try {
      const res = await fetch(`${API}/documents`);
      const data = await res.json();
      const list = document.getElementById('docsList');
      if (!data.documents.length) {
        list.innerHTML = '<div class="no-docs">No documents yet</div>';
        return;
      }
      list.innerHTML = data.documents.map(doc => `
        <div class="doc-item ${activeDoc === doc ? 'active' : ''}" onclick="selectDoc('${doc}')">
          <span class="doc-icon">📑</span>
          <span class="doc-name">${doc}</span>
        </div>
      `).join('');
    } catch(e) {}
  }

  // ── SELECT DOC ──
  function selectDoc(doc) {
    activeDoc = doc;
    document.getElementById('statusDot').className = 'dot';
    document.getElementById('activeDocLabel').innerHTML =
      `Chatting with <span class="active-doc-name">${doc}</span>`;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('questionInput').disabled = false;
    loadDocuments();
    clearChat();
  }

  function clearChat() {
    const cw = document.getElementById('chatWindow');
    cw.innerHTML = '';
  }

  // ── SEND MESSAGE ──
  const sendBtn = document.getElementById('sendBtn');
  const input = document.getElementById('questionInput');

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
  });

  async function sendMessage() {
    const q = input.value.trim();
    if (!q || !activeDoc) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    hideEmptyState();
    appendMessage('user', q);
    const thinkingEl = appendThinking();

    try {
      const res = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q, doc_name: activeDoc })
      });
      const data = await res.json();
      thinkingEl.remove();
      appendBotMessage(data.answer, data.sources);
    } catch(e) {
      thinkingEl.remove();
      appendBotMessage('❌ Could not reach the server. Make sure the backend is running.', []);
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function hideEmptyState() {
    const es = document.getElementById('emptyState');
    if (es) es.remove();
  }

  function appendMessage(role, text) {
    const cw = document.getElementById('chatWindow');
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    msg.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
    cw.appendChild(msg);
    cw.scrollTop = cw.scrollHeight;
    return msg;
  }

  function appendBotMessage(answer, sources) {
    const cw = document.getElementById('chatWindow');
    const msg = document.createElement('div');
    msg.className = 'message bot';

    let sourcesHtml = '';
    if (sources && sources.length) {
      sourcesHtml = `
        <div class="sources">
          <div class="sources-label">Sources</div>
          ${sources.map(s => `<div class="source-chip">${escapeHtml(s)}</div>`).join('')}
        </div>`;
    }

    msg.innerHTML = `<div class="bubble">${escapeHtml(answer)}</div>${sourcesHtml}`;
    cw.appendChild(msg);
    cw.scrollTop = cw.scrollHeight;
  }

  function appendThinking() {
    const cw = document.getElementById('chatWindow');
    const msg = document.createElement('div');
    msg.className = 'message bot';
    msg.innerHTML = `<div class="thinking"><span></span><span></span><span></span></div>`;
    cw.appendChild(msg);
    cw.scrollTop = cw.scrollHeight;
    return msg;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>');
  }

  // ── INIT ──
  loadDocuments();
</script>
</body>
</html>
